<!DOCTYPE html>
<html>
<head>
<title>Secure Account Login</title>
<style>
body{
font-family: Arial;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Secure Account Login</h2>

<input type="text" placeholder="Email">

<input type="password" placeholder="Password">

<button>Sign In</button>

</div>

</body>
</html>
